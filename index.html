<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEPS Voca - Study Mode</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8f9fa; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #202124; margin-bottom: 10px; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 500px; }
        button { flex: 1; border: none; padding: 15px; font-size: 14px; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        
        #shuffle-btn { background-color: #34a853; color: white; }
        #toggle-all-btn { background-color: #1a73e8; color: white; }
        #remove-checked-btn { background-color: #ea4335; color: white; }
        
        .page-ctrl { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .page-btn { background-color: #fff; border: 1px solid #ddd; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
        .page-btn:disabled { color: #ccc; cursor: not-allowed; }

        .voca-table { width: 100%; max-width: 500px; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
        .voca-table th { background-color: #f1f3f4; color: #5f6368; padding: 15px; border-bottom: 2px solid #eee; }
        .voca-table td { padding: 15px; border-bottom: 1px solid #f1f1f1; text-align: center; }

        .word-en { font-weight: bold; color: #1a73e8; font-size: 18px; }
        .meaning { cursor: pointer; color: #ea4335; font-weight: 500; padding: 5px 10px; border-radius: 5px; display: inline-block; }
        .hidden { background-color: #acd598 !important; color: #acd598 !important; }
        
        /* 체크박스 스타일 */
        input[type="checkbox"] { transform: scale(1.5); cursor: pointer; }
        .checked-row { background-color: #fff4f4; }

        .footer { margin-top: 20px; color: #70757a; font-size: 0.85em; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

    <h1>TEPS Core Voca</h1>
    
    <div class="btn-group">
        <button id="shuffle-btn">🔄 섞기</button>
        <button id="toggle-all-btn">👁️ 전체 가리기</button>
        <button id="remove-checked-btn">🗑️ 아는 단어 숨기기</button>
    </div>

    <div class="page-ctrl">
        <button class="page-btn" id="prev-btn">◀ 이전</button>
        <span id="page-info">1 / 1</span>
        <button class="page-btn" id="next-btn">다음 ▶</button>
    </div>

    <table class="voca-table">
        <thead>
            <tr>
                <th>체크</th>
                <th>단어</th>
                <th>뜻</th>
            </tr>
        </thead>
        <tbody id="voca-body"></tbody>
    </table>

    <p class="footer">
        모르는 단어에 <b>체크</b>해보세요!<br>
        체크 후 '숨기기'를 누르면 모르는 것만 남길 수 있습니다.
    </p>

    <script>
        // ... (단어 데이터는 이전과 동일하므로 생략, 실제 코드 사용 시 전체 데이터 포함)
        let words = [
            { en: "abandon", ko: "(v) 버리다, 포기하다" }, { en: "abbreviate", ko: "(v) 축약하다" }, { en: "aberration", ko: "(n) 일탈, 변형" },
            { en: "abhor", ko: "(v) 혐오하다" }, { en: "abide", ko: "(v) 견디다, (규칙을) 준수하다" }, { en: "abject", ko: "(a) 비참한, 비굴한" },
            { en: "abolish", ko: "(v) 폐지하다" }, { en: "abominable", ko: "(a) 가공할, 심히 끔찍한" }, { en: "abortive", ko: "(a) 실패한, 무산된" },
            { en: "abound", ko: "(v) 아주 많다, 풍부하다" }, { en: "abruptly", ko: "(ad) 갑작스럽게, 퉁명스럽게" }, { en: "absenteeism", ko: "(n) 잦은 결석, 장기 결근" },
            // ... (나머지 단어들)
        ];

        let currentPage = 1;
        const itemsPerPage = 20; // 체크박스가 있어 조금 줄였습니다.
        let allHidden = true;

        const tbody = document.getElementById('voca-body');
        const pageInfo = document.getElementById('page-info');

        function renderWords() {
            tbody.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pagedWords = words.slice(start, end);

            pagedWords.forEach((word, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="checkbox" class="word-check"></td>
                    <td class="word-en">${word.en}</td>
                    <td><span class="meaning ${allHidden ? 'hidden' : ''}">${word.ko}</span></td>
                `;
                tbody.appendChild(row);
            });

            pageInfo.innerText = `${currentPage} / ${Math.ceil(words.length / itemsPerPage)}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === Math.ceil(words.length / itemsPerPage);
        }

        // 체크한 단어(아는 단어) 목록에서 제거하기
        document.getElementById('remove-checked-btn').onclick = () => {
            const checkboxes = document.querySelectorAll('.word-check');
            let toRemove = [];
            checkboxes.forEach((cb, i) => {
                if (cb.checked) {
                    const actualIndex = (currentPage - 1) * itemsPerPage + i;
                    toRemove.push(actualIndex);
                }
            });
            
            // 뒤에서부터 지워야 인덱스가 안 꼬임
            for (let i = toRemove.length - 1; i >= 0; i--) {
                words.splice(toRemove[i], 1);
            }
            renderWords();
        };

        document.getElementById('shuffle-btn').onclick = () => {
            words.sort(() => Math.random() - 0.5);
            currentPage = 1;
            renderWords();
        };

        document.getElementById('toggle-all-btn').onclick = () => {
            allHidden = !allHidden;
            renderWords();
        };

        document.getElementById('prev-btn').onclick = () => { if(currentPage > 1) { currentPage--; renderWords(); } };
        document.getElementById('next-btn').onclick = () => { if(currentPage < words.length/itemsPerPage) { currentPage++; renderWords(); } };

        tbody.onclick = (e) => {
            if (e.target.classList.contains('meaning')) e.target.classList.toggle('hidden');
        };

        renderWords();
    </script>
</body>
</html>
