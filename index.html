        #remove-checked-btn { background-color: #ea4335; color: white; }

        .voca-table { width: 100%; max-width: 600px; border-collapse: collapse; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.08); }

        .meaning { cursor: pointer; color: #ea4335; font-weight: 500; padding: 4px 8px; border-radius: 5px; display: inline-block; transition: background 0.2s; }
        .hidden { background-color: #acd598 !important; color: #acd598 !important; }
        
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }
        .footer { margin-top: 20px; color: #70757a; font-size: 0.85em; text-align: center; line-height: 1.6; }

            { en: "ubiquitous", ko: "(a) 어디에나 있는" }, { en: "venerate", ko: "(v) 존경하다" }, { en: "versatile", ko: "(a) 다재다능한" },
            { en: "wary", ko: "(a) 경계하는" }, { en: "zealous", ko: "(a) 열성적인" }
        ];

        let currentPage = 1;
        const itemsPerPage = 30;
        let allHidden = true;

        const tbody = document.getElementById('voca-body');
        const pageInfo = document.getElementById('page-info');

        function renderWords() {
            tbody.innerHTML = '';
            const totalItems = words.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            
            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pagedWords = words.slice(start, end);

            pagedWords.forEach((word) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="checkbox" class="word-check"></td>
                    <td class="word-en">${word.en}</td>
                    <td><span class="meaning ${allHidden ? 'hidden' : ''}">${word.ko}</span></td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById('title').innerText = `TEPS Core Voca (${totalItems})`;
            pageInfo.innerText = `${currentPage} / ${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage === 1;
            document.getElementById('next-btn').disabled = currentPage === totalPages;
        }

        document.getElementById('remove-checked-btn').onclick = () => {
            const checkboxes = document.querySelectorAll('.word-check');
            let indicesToRemove = [];
            
            checkboxes.forEach((cb, index) => {
                if (cb.checked) {
                    indicesToRemove.push((currentPage - 1) * itemsPerPage + index);
                }
            });

            if (indicesToRemove.length === 0) {
                alert("제외할 단어를 체크해 주세요!");
                return;
            }

            // 역순으로 지워야 인덱스가 밀리지 않음
            for (let i = indicesToRemove.length - 1; i >= 0; i--) {
                words.splice(indicesToRemove[i], 1);
            }
            renderWords();
        };

        document.getElementById('shuffle-btn').onclick = () => {
            words.sort(() => Math.random() - 0.5);
            currentPage = 1;
            renderWords();
        };

        document.getElementById('toggle-all-btn').onclick = () => {
            allHidden = !allHidden;
            renderWords();
        };

        document.getElementById('prev-btn').onclick = () => { 
            if(currentPage > 1) { 
                currentPage--; 
                renderWords(); 
                window.scrollTo(0,0);
            } 
        };
        
        document.getElementById('next-btn').onclick = () => { 
            if(currentPage < Math.ceil(words.length / itemsPerPage)) { 
                currentPage++; 
                renderWords(); 
                window.scrollTo(0,0);
            } 
        };

        tbody.onclick = (e) => {
            if (e.target.classList.contains('meaning')) e.target.classList.toggle('hidden');
        };

        renderWords();
    </script>
</body>
</html>
